name: build-and-test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Vet code
        run: go vet ./...
      - name: Build code
        run: go build -v ./...
      - name: Test code
        run: go test -v -race -count=1 ./...
